{{ if . }}
<div class="overflow-x-auto rounded-b-2xl">
    <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400">
        <thead
            class="text-xs text-slate-700 uppercase bg-slate-50 dark:bg-slate-800/50 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
            <tr>
                <th scope="col" class="px-6 py-4 font-semibold">Açıklama</th>
                <th scope="col" class="px-6 py-4 font-semibold">Tarih</th>
                <th scope="col" class="px-6 py-4 font-semibold text-right">Tutar</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-200 dark:divide-slate-700/50">
            {{ range . }}
            <tr class="bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                <td class="px-6 py-4 font-medium text-slate-900 dark:text-white">
                    {{ .Title }}
                </td>
                <td class="px-6 py-4">
                    {{ .PaymentDate.Format "02.01.2006" }}
                </td>
                <td class="px-6 py-4 font-bold text-emerald-600 dark:text-emerald-400 text-right">
                    + ₺{{ printf "%.2f" .Amount }}
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ else }}
<div
    class="flex flex-col items-center justify-center py-12 text-slate-400 dark:text-slate-500 bg-white dark:bg-slate-900 rounded-b-2xl">
    <div
        class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-full mb-3 border border-slate-100 dark:border-slate-700/50 shadow-sm">
        <svg class="w-8 h-8 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6">
            </path>
        </svg>
    </div>
    <span class="text-sm font-medium">Bu aya ait prim veya ek ödeme kaydı bulunmuyor.</span>
    <button hx-get="/dashboard/modals/extra" hx-target="#modal-container" hx-swap="innerHTML"
        class="mt-3 text-xs font-semibold text-sky-600 hover:text-sky-700 dark:text-sky-400 dark:hover:text-sky-300 transition-colors">
        Hemen Yeni Ekle
    </button>
</div>
{{ end }}
